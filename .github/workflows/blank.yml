name: Android CI/CD (Auto Build APK)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find Gradlew and Grant Permission
      run: |
        GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "ERROR: File gradlew tidak ditemukan di seluruh repositori!"
          exit 1
        fi
        echo "Gradlew ditemukan di: $GRADLEW_PATH"
        chmod +x "$GRADLEW_PATH"
        echo "GRADLEW_DIR=$(dirname "$GRADLEW_PATH")" >> $GITHUB_ENV

    - name: Build Debug APK
      run: |
        cd ${{ env.GRADLEW_DIR }}
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: '**/build/outputs/apk/debug/*.apk'
